query RunInput {
  cart {
    lines {
      id
      quantity
      __custom_price: attribute(key: "__custom_price") {
        value
      }
      __variant_id: attribute(key: "__variant_id") {
        value
      }
      __isValid: attribute(key: "__isValid") {
        value
      }
      __qty: attribute(key: "__qty") {
        value
      }
      cost {
        amountPerQuantity {
          currencyCode
          amount
        }
      }
    }
  }
}
